worker_processes  1;

events {
    worker_connections  1024;
}

pid nginx.pid;
error_log stderr;
daemon off;

http {
    default_type  application/octet-stream;

    sendfile        on;
    server_tokens off;
    
    # Access logs disabled — nginx here is a thin proxy in front of the Node
    # app, which emits its own request logging. `/dev/stdout` can't be used
    # because nginx's stdout is inherited as a pipe FD (Node pipes it through
    # pino), and you can't open() a pipe.
    access_log off;
    client_body_temp_path client_body;
    fastcgi_temp_path fastcgi_temp;
    proxy_temp_path proxy_temp;
    scgi_temp_path scgi_temp;
    uwsgi_temp_path uwsgi_temp;

    client_max_body_size 100m;

    # Belt-and-braces security headers. The Node app also sets these via
    # nuxt-security's CSP/Helmet-equivalent, but adding them at the reverse
    # proxy means they apply to every response nginx terminates — including
    # depot ranges and the case where the upstream errors before emitting
    # its own headers. `always` ensures they're added on non-2xx responses too.
    # HSTS is deliberately omitted here because deployments vary (some expose
    # plain HTTP behind an external TLS terminator) — nuxt-security emits
    # HSTS conditionally on NODE_ENV=production and that's where it belongs.
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    server {
        listen       3000;
        server_name  localhost;

        location / {
                proxy_pass http://localhost:4000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
        }

        location /api/v1/depot/ {
                proxy_pass http://localhost:5000;
                proxy_read_timeout 300s;
                proxy_connect_timeout 75s;
        }
    }
}
